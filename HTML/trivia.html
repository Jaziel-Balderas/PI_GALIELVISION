<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia - GalielVision</title>
    <link rel="icon" href="../IMAGES/TRIVIA.png" type="image/png">
    <link rel="stylesheet" href="../CSS/triviaStyle.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0">
</head>

<body>

    <div class="trivia-container">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="question-card">
            <span class="material-symbols-outlined"
                style="font-size: 4rem; color: #38bdf8; margin-bottom: 15px;">quiz</span>
            <p id="question-text" class="question-text">Cargando desafío diario...</p>
        </div>

        <div class="answers-grid" id="options-container">
        </div>

        <div id="message-container">
        </div>

        <div class="footer-controls">
            <a href="/index.html" class="btn-back">
                <span class="material-symbols-outlined">arrow_back</span> MENÚ PRINCIPAL
            </a>

            <button onclick="reiniciarTrivia()" class="btn-debug">
                Reiniciar (Modo Prueba)
            </button>
        </div>
    </div>

    <script>
        let bancoCompleto = [];
        let preguntasDelDia = [];
        let indiceActual = 0;
        let aciertosDiarios = 0;

        async function cargarBancoPreguntas() {
            try {
                const respuesta = await fetch('../JSON/preguntas.json');
                bancoCompleto = await respuesta.json();
                prepararTriviaDelDia();
            } catch (error) {
                console.error("Error cargando preguntas:", error);
                document.getElementById('question-text').innerText = "Error al cargar el archivo JSON.";
            }
        }

        function prepararTriviaDelDia() {
            const hoy = new Date();
            const diaID = hoy.getFullYear().toString() +
                (hoy.getMonth() + 1).toString().padStart(2, '0') +
                hoy.getDate().toString().padStart(2, '0');

            // Verificar si terminó hoy
            const completada = localStorage.getItem('triviaCompletada_' + diaID);
            if (completada) {
                mostrarResultadoFinal(localStorage.getItem('puntaje_' + diaID), true);
                return;
            }

            // Seleccionar 5 preguntas usando el día como semilla
            const semilla = parseInt(diaID);
            preguntasDelDia = [];
            for (let i = 0; i < 5; i++) {
                const index = (semilla + i) % bancoCompleto.length;
                preguntasDelDia.push(bancoCompleto[index]);
            }

            // Recuperar progreso
            indiceActual = parseInt(localStorage.getItem('progreso_' + diaID)) || 0;
            aciertosDiarios = parseInt(localStorage.getItem('puntaje_' + diaID)) || 0;

            mostrarPregunta();
        }

        function mostrarPregunta() {
            const pregunta = preguntasDelDia[indiceActual];
            const container = document.getElementById('options-container');
            const questionEl = document.getElementById('question-text');
            const messageEl = document.getElementById('message-container');
            const bar = document.getElementById('progress-bar');

            // Actualizar barra y texto
            bar.style.width = `${(indiceActual / 5) * 100}%`;
            messageEl.innerText = `PREGUNTA ${indiceActual + 1} DE 5`;

            questionEl.innerText = pregunta.q;
            container.innerHTML = "";

            pregunta.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = `btn-answer opt-${index + 1}`;
                btn.innerHTML = `<span class="material-symbols-outlined">pending</span> ${opt}`;
                btn.onclick = () => verificarRespuesta(btn, index, pregunta.correct);
                container.appendChild(btn);
            });
        }

        function verificarRespuesta(boton, index, correcto) {
            const hoy = new Date();
            const diaID = hoy.getFullYear().toString() + (hoy.getMonth() + 1).toString().padStart(2, '0') + hoy.getDate().toString().padStart(2, '0');
            const botones = document.querySelectorAll('.btn-answer');

            botones.forEach(btn => btn.classList.add('disabled'));

            if (index === correcto) {
                aciertosDiarios++;
                boton.classList.add('correct');
                boton.querySelector('.material-symbols-outlined').innerText = "verified";
            } else {
                boton.classList.add('wrong');
                boton.querySelector('.material-symbols-outlined').innerText = "close";
                botones[correcto].classList.add('correct');
                botones[correcto].querySelector('.material-symbols-outlined').innerText = "verified";
            }

            indiceActual++;
            localStorage.setItem('progreso_' + diaID, indiceActual);
            localStorage.setItem('puntaje_' + diaID, aciertosDiarios);

            setTimeout(() => {
                if (indiceActual < 5) {
                    mostrarPregunta();
                } else {
                    localStorage.setItem('triviaCompletada_' + diaID, 'true');
                    mostrarResultadoFinal(aciertosDiarios, false);
                }
            }, 1500);
        }

        function mostrarResultadoFinal(puntos, yaEstabaHecho) {
            document.getElementById('progress-bar').style.width = "100%";
            const questionEl = document.getElementById('question-text');
            const container = document.getElementById('options-container');
            const messageEl = document.getElementById('message-container');

            questionEl.innerText = "¡DESAFÍO COMPLETADO!";
            container.innerHTML = `
                <div class="result-card">
                    <h2>TU PUNTAJE</h2>
                    <div class="score-circle">${puntos}/5</div>
                    <p>${puntos >= 3 ? "¡Eres un experto!" : "¡Sigue practicando!"}</p>
                </div>
            `;
            messageEl.innerText = "Vuelve mañana para nuevas preguntas";
        }

        function reiniciarTrivia() {
            const hoy = new Date();
            const diaID = hoy.getFullYear().toString() + (hoy.getMonth() + 1).toString().padStart(2, '0') + hoy.getDate().toString().padStart(2, '0');
            localStorage.removeItem('triviaCompletada_' + diaID);
            localStorage.removeItem('progreso_' + diaID);
            localStorage.removeItem('puntaje_' + diaID);
            location.reload();
        }

        cargarBancoPreguntas();
    </script>
</body>

</html>
