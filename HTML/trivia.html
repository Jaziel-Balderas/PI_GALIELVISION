<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia - GalielVision</title>
    <link rel="icon" href="../IMAGES/TRIVIA.png" type="image/png">
    <link rel="stylesheet" href="../CSS/triviaStyle.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
</head>

<body>

    <div class="trivia-container">
        <div class="question-card">
            <span class="material-symbols-outlined"
                style="font-size: 4rem; color: #38bdf8; margin-bottom: 15px;">quiz</span>
            <p id="question-text" class="question-text">Cargando desafío...</p>
        </div>

        <div class="answers-grid" id="options-container">
        </div>

        <div id="message-container" style="text-align: center; margin-top: 15px; font-weight: bold; min-height: 24px;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 30px;">
            <a href="/index.html" class="btn-back">
                <span class="material-symbols-outlined">arrow_back</span> MENÚ PRINCIPAL
            </a>

            <button onclick="reiniciarTrivia()"
                style="background: transparent; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 0.8rem;">
                Reiniciar (Modo Prueba)
            </button>
        </div>
    </div>
    <script>
        // 1. Función para cargar el archivo JSON externo
        async function cargarBancoPreguntas() {
            try {
                const respuesta = await fetch('../JSON/preguntas.json'); // Ruta a tu archivo
                const datos = await respuesta.json();
                iniciarJuego(datos);
            } catch (error) {
                console.error("Error cargando las preguntas:", error);
                document.getElementById('question-text').innerText = "Error al cargar preguntas.";
            }
        }

        function iniciarJuego(bancoPreguntas) {
            const hoy = new Date();

            // Creamos un ID único por día YYYYMMDD
            const diaID = hoy.getFullYear().toString() +
                (hoy.getMonth() + 1).toString().padStart(2, '0') +
                hoy.getDate().toString().padStart(2, '0');


            const indicePregunta = parseInt(diaID) % bancoPreguntas.length;
            const pregunta = bancoPreguntas[indicePregunta];

            const yaRespondio = localStorage.getItem('ultimaTriviaRespondida') === diaID;
            const respuestaGuardada = localStorage.getItem('resultadoUltimaTrivia');
            const indiceElegido = localStorage.getItem('indiceElegido');

            const container = document.getElementById('options-container');
            const questionEl = document.getElementById('question-text');
            const messageEl = document.getElementById('message-container');

            questionEl.innerText = pregunta.q;
            container.innerHTML = "";

            pregunta.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = `btn-answer opt-${index + 1}`;
                btn.innerHTML = `<span class="material-symbols-outlined">pending</span> ${opt}`;

                if (yaRespondio) {
                    btn.classList.add('disabled');
                    if (index === pregunta.correct) {
                        btn.classList.add('correct');
                        btn.querySelector('.material-symbols-outlined').innerText = "verified";
                    } else if (index == indiceElegido && respuestaGuardada === 'wrong') {
                        btn.classList.add('wrong');
                        btn.querySelector('.material-symbols-outlined').innerText = "close";
                    }
                }

                btn.onclick = () => {
                    if (!yaRespondio) {
                        verificarRespuesta(btn, index, pregunta.correct, diaID);
                    }
                };

                container.appendChild(btn);
            });

            if (yaRespondio) {
                messageEl.innerText = (respuestaGuardada === 'correct') ?
                    "¡Excelente! Vuelve mañana para más." :
                    "Hoy no acertaste. ¡Mañana será otro día!";
                messageEl.style.color = (respuestaGuardada === 'correct') ? "#00ff88" : "#ff3333";
            }
        }

        function verificarRespuesta(boton, index, correcto, diaID) {
            const botones = document.querySelectorAll('.btn-answer');
            const messageEl = document.getElementById('message-container');

            localStorage.setItem('ultimaTriviaRespondida', diaID);
            localStorage.setItem('indiceElegido', index);
            botones.forEach(btn => btn.classList.add('disabled'));

            if (index === correcto) {
                localStorage.setItem('resultadoUltimaTrivia', 'correct');
                boton.classList.add('correct');
                boton.querySelector('.material-symbols-outlined').innerText = "verified";
                messageEl.innerText = "¡RESPUESTA CORRECTA! 🏆";
                messageEl.style.color = "#00ff88";
            } else {
                localStorage.setItem('resultadoUltimaTrivia', 'wrong');
                boton.classList.add('wrong');
                boton.querySelector('.material-symbols-outlined').innerText = "close";
                botones[correcto].classList.add('correct');
                botones[correcto].querySelector('.material-symbols-outlined').innerText = "verified";
                messageEl.innerText = "¡Casi! Mañana tienes otra oportunidad.";
                messageEl.style.color = "#ff3333";
            }
        }

        function reiniciarTrivia() {
            localStorage.removeItem('ultimaTriviaRespondida');
            localStorage.removeItem('resultadoUltimaTrivia');
            localStorage.removeItem('indiceElegido');
            location.reload();
        }

        // Llamamos a la función de carga al iniciar
        cargarBancoPreguntas();
    </script>
</body>

</html>
