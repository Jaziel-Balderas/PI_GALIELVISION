<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalielVision - Escudos 2026</title>
    <link rel="stylesheet" href="../CSS/scanStyle.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* --- ESTILOS ORIGINALES --- */
        #mensaje-overlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            color: #38bdf8;
            padding: 30px;
            border: 3px solid #38bdf8;
            border-radius: 20px;
            z-index: 3000;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.6);
        }

        #texto-mensaje {
            margin: 0;
            font-size: 20px;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .btn-cerrar {
            margin-top: 20px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Orbitron';
            transition: transform 0.2s;
        }

        .info-side {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            display: flex;
        }

        .info-side.active {
            opacity: 1;
            pointer-events: auto;
        }

        .a-enter-vr,
        .a-enter-ar,
        .a-orientation-modal,
        .a-loader-title {
            display: none !important;
        }

        /* MODAL DE INFO */
        .modal-info {
            display: none;
            position: fixed;
            z-index: 4000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
        }

        .modal-content {
            background: #0f172a;
            border: 2px solid #38bdf8;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 0 20px #38bdf8;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #38bdf8;
            margin: 15px 0;
        }

        .close-info {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            color: #38bdf8;
            cursor: pointer;
        }

        #info-nombre-jugador {
            color: #fbbf24;
            font-size: 18px;
            margin-top: 5px;
        }

        .clickable {
            cursor: pointer;
        }

        /* Ajuste para que los model-viewer se vean bien en tus cuadros */
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        /* ARREGLO CSS: Contenedor flexible para los trofeos */
        #trophy-container-viewer {
            display: flex;
            justify-content: center;
            /* Trofeos centrados */
            align-items: center;
            /* V-centrado de trofeos */
            gap: 10px;
            /* Espacio entre trofeos */
            overflow: visible;
            /* Asegura que no se corten */
        }
    </style>
</head>

<body>
    <audio id="siuuu-audio" src="../siuu.mp3" preload="auto"></audio>

    <div id="modal-info" class="modal-info">
        <div class="modal-content">
            <span class="close-info" onclick="cerrarInfo()">&times;</span>
            <h3 id="info-titulo-tipo" style="font-size: 14px; color: #38bdf8; letter-spacing: 2px;">TÍTULO</h3>
            <img id="info-foto" src="" alt="Foto Jugador">
            <p id="info-nombre-jugador">NOMBRE</p>
        </div>
    </div>

    <div id="mensaje-overlay">
        <p id="texto-mensaje"></p>
        <button class="btn-cerrar" onclick="cerrarMensaje()">¡CERRAR!</button>
    </div>

    <button class="btn-cerrar-top" onclick="window.location.href='../index.html'">
        ✕ <span class="text-btn">CERRAR ESCÁNER</span>
    </button>

    <div class="app-container">
        <header class="main-header">
            <h1>GALIEL<span>VISION</span></h1>
            <div class="badge-pais">
                <span id="flag-icon" class="fi fi-xx"></span>
                <span id="country-name">ESPERANDO ESCUDO...</span>
            </div>
        </header>

        <main class="content-layout">
            <section class="camera-side">
                <div class="video-window">
                    <a-scene id="escena-ar"
                        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.001;"
                        embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
                        ar-mode-ui="enabled: false">

                        <a-assets>
                            <a-asset-item id="trofeo-mod" src="../Modelos/world_cup_trophy.glb"></a-asset-item>
                            <a-asset-item id="porteria-mod"
                                src="../Modelos/porteria_futbol_soccer_goal.glb"></a-asset-item>
                            <a-asset-item id="modelo-mexico" src="../Modelos/Mexico.glb"></a-asset-item>
                            <a-asset-item id="modelo-usa" src="../Modelos/USA.glb"></a-asset-item>
                            <a-asset-item id="modelo-canada" src="../Modelos/canadá.glb"></a-asset-item>
                            <a-asset-item id="modelo-espana" src="../Modelos/Espana.glb"></a-asset-item>
                            <a-asset-item id="modelo-colombia" src="../Modelos/Colombia.glb"></a-asset-item>
                            <a-asset-item id="modelo-uruguay" src="../Modelos/Uruguay.glb"></a-asset-item>
                            <a-asset-item id="modelo-japon" src="../Modelos/Japon.glb"></a-asset-item>
                            <a-asset-item id="modelo-corea" src="../Modelos/Corea.glb"></a-asset-item>
                            <a-asset-item id="modelo-sudafrica" src="../Modelos/Sudafica.glb"></a-asset-item>
                            <a-asset-item id="modelo-uzbekistan" src="../Modelos/uzbekistan.glb"></a-asset-item>
                            <a-asset-item id="modelo-tunez" src="../Modelos/tunez.glb"></a-asset-item>
                        </a-assets>

                        <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"
                            cursor="rayOrigin: mouse; fuse: false;"
                            raycaster="objects: .clickable">
                            <a-light type="directional" color="#ffffff" intensity="4.5" position="20 5 12"></a-light>
                            <a-light type="ambient" color="#88ccff" intensity="2.6"></a-light>
                            <a-gltf-model id="ronaldo-model" position="5 0 -30" scale="2 2 2" rotation="0 0 0"
                                animation-mixer="timeScale: 0" class="clickable" play-siuuu gyro-rotate draggable visible="false"> </a-gltf-model>
                        </a-camera>

                        <a-entity mindar-image-target="targetIndex: 0" data-id="0"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 1" data-id="1"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 2" data-id="2"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 3" data-id="3"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 4" data-id="4"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 5" data-id="5"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 6" data-id="6"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 7" data-id="7"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 8" data-id="8"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 9" data-id="9"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 10" data-id="10"></a-entity>
                    </a-scene>
                    <div class="scan-frame"></div>
                </div>

                <div id="container-mejor-gol" class="button-group">
                    <button class="btn-highlight" onclick="verMejorGol()"
                        style="width: 280px; height: 80px !important;">
                        <div class="highlight-3d">
                            <model-viewer src="../Modelos/porteria_futbol_soccer_goal.glb" autoplay auto-rotate
                                interaction-prompt="none" disable-zoom></model-viewer>
                        </div>
                        <span class="btn-text">VER MEJOR<br>GOL</span>
                    </button>
                </div>
            </section>

            <section class="info-side" id="info-panel">
                <h2 id="equipo-txt"
                    style=" font-size: 50px; color: #38bdf8; font-family: 'Orbitron'; text-align: center; margin-bottom: 20px;">
                    PAÍS</h2>

                <div class="info-card trophy-card">
                    <div class="info-text"><span id="trophy-label" class="value"> MUNDIALES:</span></div>
                    <div class="view-3d" id="trophy-container-viewer">
                    </div>
                </div>

                <div class="stats-mini-grid">
                    <div class="stat-item clickable" onclick="mostrarInfo('goleador')">
                        <div class="mini-3d">
                            <model-viewer src="../Modelos/football.glb" autoplay auto-rotate interaction-prompt="none"
                                disable-zoom></model-viewer>
                        </div>
                        <span>GOLEADOR</span>
                    </div>

                    <div class="stat-item clickable" onclick="mostrarInfo('asistidor')">
                        <div class="mini-3d">
                            <model-viewer src="../Modelos/scanned_soccer_shoe.glb" autoplay auto-rotate
                                interaction-prompt="none" disable-zoom></model-viewer>
                        </div>
                        <span>ASISTIDOR</span>
                    </div>

                    <div class="stat-item clickable" onclick="mostrarInfo('portero')">
                        <div class="mini-3d">
                            <model-viewer src="../Modelos/gloves_goalkeeper.glb" autoplay auto-rotate
                                interaction-prompt="none" disable-zoom></model-viewer>
                        </div>
                        <span>PORTERO</span>
                    </div>

                    <div class="stat-item clickable" onclick="mostrarInfo('estadio')">
                        <div class="mini-3d">
                            <model-viewer src="../Modelos/low_quality_soccer_stadium.glb" autoplay auto-rotate
                                interaction-prompt="none" disable-zoom></model-viewer>
                        </div>
                        <span>ESTADIO</span>
                    </div>
                </div>

                <div class="prediction-box">
                    <div class="vote-options">
                        <div class="vote-btn">
                            <div class="vote-3d">
                                <model-viewer id="crown-viewer" src="../Modelos/golden_crown.glb" autoplay auto-rotate
                                    interaction-prompt="none" disable-zoom></model-viewer>
                            </div>
                            <button onclick="procesarVoto(true)">SÍ</button>
                        </div>
                        <div class="vote-btn">
                            <div class="vote-3d">
                                <model-viewer id="emoji-viewer" src="../Modelos/emoji_tired_cartoon.glb" autoplay
                                    auto-rotate interaction-prompt="none" disable-zoom></model-viewer>
                            </div>
                            <button class="no" onclick="procesarVoto(false)">NO</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        AFRAME.registerComponent('draggable', {
            init: function () {
                this.isDragging = false;
                this.lastPos = { x: 0, y: 0 };
                var el = this.el;
                var self = this;

                this.el.sceneEl.addEventListener('renderstart', function () {
                    var canvas = self.el.sceneEl.canvas;

                    function hitTest(evt) {
                        var rect = canvas.getBoundingClientRect();
                        var cx = evt.touches ? evt.touches[0].clientX : evt.clientX;
                        var cy = evt.touches ? evt.touches[0].clientY : evt.clientY;
                        var mouse = new THREE.Vector2(
                            ((cx - rect.left) / rect.width) * 2 - 1,
                            -((cy - rect.top) / rect.height) * 2 + 1
                        );
                        var rc = new THREE.Raycaster();
                        rc.setFromCamera(mouse, el.sceneEl.camera);
                        return rc.intersectObject(el.object3D, true).length > 0;
                    }

                    function startDrag(cx, cy, evt) {
                        self.isDragging = true;
                        self.lastPos.x = cx;
                        self.lastPos.y = cy;
                        evt.preventDefault();
                    }

                    function moveDrag(cx, cy) {
                        if (!self.isDragging) return;
                        var dx = cx - self.lastPos.x;
                        var dy = cy - self.lastPos.y;
                        var pos = el.getAttribute('position');
                        var factor = 0.08;
                        el.setAttribute('position', {
                            x: pos.x + dx * factor,
                            y: pos.y - dy * factor,
                            z: pos.z
                        });
                        self.lastPos.x = cx;
                        self.lastPos.y = cy;
                    }

                    canvas.addEventListener('mousedown', function (e) {
                        if (hitTest(e)) startDrag(e.clientX, e.clientY, e);
                    });
                    canvas.addEventListener('mousemove', function (e) {
                        moveDrag(e.clientX, e.clientY);
                    });
                    canvas.addEventListener('mouseup', function () { self.isDragging = false; });

                    canvas.addEventListener('touchstart', function (e) {
                        if (e.touches.length === 1 && hitTest(e)) startDrag(e.touches[0].clientX, e.touches[0].clientY, e);
                    }, { passive: false });
                    canvas.addEventListener('touchmove', function (e) {
                        if (e.touches.length === 1) {
                            e.preventDefault();
                            moveDrag(e.touches[0].clientX, e.touches[0].clientY);
                        }
                    }, { passive: false });
                    canvas.addEventListener('touchend', function () { self.isDragging = false; });
                });
            }
        });

        AFRAME.registerComponent('gyro-rotate', {
            init: function () {
                this.offset = null;
                this.currentAlpha = 0;
                var self = this;
                window.addEventListener('deviceorientation', function (e) {
                    if (e.alpha === null) return;
                    if (self.offset === null) self.offset = e.alpha;
                    self.currentAlpha = (e.alpha - self.offset) * 2.0;
                });
            },
            tick: function () {
                this.el.object3D.rotation.y = THREE.MathUtils.degToRad(this.currentAlpha);
            }
        });

        AFRAME.registerComponent('play-siuuu', {
            init: function () {
                this.el.addEventListener('click', function () {
                    var audio = document.getElementById('siuuu-audio');
                    audio.currentTime = 0;
                    audio.play().catch(function (e) { console.warn('Audio bloqueado:', e); });
                });
            }
        });

        let infoDetallada = {};
        fetch('../JSON/datos_paises.json')
            .then(response => response.json())
            .then(data => { infoDetallada = data; })
            .catch(err => console.error("Error al cargar JSON:", err));

        const listaPaises = [
            { n: "MÉXICO", f: "fi-mx", m: 0, modelo: "#modelo-mexico" },
            { n: "USA", f: "fi-us", m: 0, modelo: "#modelo-usa" },
            { n: "CANADÁ", f: "fi-ca", m: 0, modelo: "#modelo-canada" },
            { n: "ESPAÑA", f: "fi-es", m: 1, modelo: "#modelo-espana" },
            { n: "COLOMBIA", f: "fi-co", m: 0, modelo: "#modelo-colombia" },
            { n: "URUGUAY", f: "fi-uy", m: 2, modelo: "#modelo-uruguay" },
            { n: "JAPÓN", f: "fi-jp", m: 0, modelo: "#modelo-japon" },
            { n: "COREA DEL SUR", f: "fi-kr", m: 0, modelo: "#modelo-corea" },
            { n: "SUDÁFRICA", f: "fi-za", m: 0, modelo: "#modelo-sudafrica" },
            { n: "UZBEKISTÁN", f: "fi-uz", m: 0, modelo: "#modelo-uzbekistan" },
            { n: "TÚNEZ", f: "fi-tn", m: 0, modelo: "#modelo-tunez" }
        ];

        let nombrePaisActual = "";
        let urlPaisActual = "";

        document.querySelectorAll('[mindar-image-target]').forEach((entity) => {
            entity.addEventListener("targetFound", () => {
                const idx = parseInt(entity.dataset.id);
                const datos = listaPaises[idx];
                if (datos) {
                    nombrePaisActual = datos.n;
                    urlPaisActual = datos.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s/g, "-");
                    document.getElementById('country-name').innerText = datos.n;
                    document.getElementById('equipo-txt').innerText = datos.n;
                    document.getElementById('flag-icon').className = `fi ${datos.f}`;

                    const container = document.getElementById('trophy-container-viewer');
                    const label = document.getElementById('trophy-label');
                    container.innerHTML = "";

                    // Reset de velocidad global para model-viewers al escanear nuevo
                    ajustarVelocidadGlobal("30deg");

                    if (datos.m === 0) {
                        label.innerText = "SIN TÍTULOS MUNDIALES";
                    } else {
                        label.innerText = `MUNDIALES: ${datos.m}`;
                        for (let i = 0; i < datos.m; i++) {
                            const trophy = document.createElement('model-viewer');
                            trophy.setAttribute('src', '../Modelos/world_cup_trophy.glb');
                            trophy.setAttribute('autoplay', '');
                            trophy.setAttribute('auto-rotate', '');
                            trophy.setAttribute('rotation-per-second', '30deg'); // Velocidad inicial normal

                            // ARREGLO JS: Tamaño de la copa duplicado
                            trophy.style.width = "80px";
                            trophy.style.height = "80px";
                            container.appendChild(trophy);
                        }
                    }
                    document.getElementById('info-panel').classList.add('active');
                    document.getElementById('container-mejor-gol').classList.add('visible');

                    var modelo3d = document.getElementById('ronaldo-model');
                    modelo3d.setAttribute('visible', 'false');
                    modelo3d.removeAttribute('gltf-model');
                    modelo3d.removeAttribute('animation-mixer');
                    setTimeout(function() {
                        modelo3d.setAttribute('gltf-model', datos.modelo);
                        modelo3d.setAttribute('animation-mixer', 'timeScale: 0');
                        modelo3d.setAttribute('visible', 'true');
                    }, 100);

                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            });
        });

        // Función auxiliar para cambiar la velocidad de rotación de los model-viewers
        function ajustarVelocidadGlobal(velocidadModelViewer) {
            const todosLosModelViewers = document.querySelectorAll('model-viewer');
            todosLosModelViewers.forEach(m => {
                m.setAttribute('rotation-per-second', velocidadModelViewer);
            });
        }

        function mostrarInfo(tipo) {
            if (!nombrePaisActual || !infoDetallada[nombrePaisActual]) return;
            const data = infoDetallada[nombrePaisActual][tipo];
            document.getElementById('info-titulo-tipo').innerText = tipo.toUpperCase();
            document.getElementById('info-foto').src = data.img;
            document.getElementById('info-nombre-jugador').innerText = data.nombre;
            document.getElementById('modal-info').style.display = 'flex';
        }

        function cerrarInfo() { document.getElementById('modal-info').style.display = 'none'; }

        function procesarVoto(voto) {
            if (!nombrePaisActual) return;
            const modal = document.getElementById('mensaje-overlay');
            const texto = document.getElementById('texto-mensaje');
            texto.innerHTML = voto ?
                `¡VOTASTE QUE <span style="color:#fbbf24">${nombrePaisActual}</span> SERÁ CAMPEÓN! 🏆` :
                `VOTASTE QUE <span style="color:#f87171">${nombrePaisActual}</span> NO GANARÁ. 😴`;

            if (voto) {
                // Modo turbo
                ajustarVelocidadGlobal("400deg");
                confetti({ particleCount: 150, spread: 100 });
                document.getElementById('ronaldo-model').setAttribute('animation-mixer', 'timeScale: 1');
            } else {
                // Modo ultra-lento
                ajustarVelocidadGlobal("5deg");
            }
            modal.style.display = 'block';
        }

        function cerrarMensaje() { document.getElementById('mensaje-overlay').style.display = 'none'; }
        function verMejorGol() { if (urlPaisActual) window.location.href = `video.html?pais=${urlPaisActual}`; }
    </script>
</body>

</html>
