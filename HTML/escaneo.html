<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalielVision - Escudos 2026</title>
    <link rel="stylesheet" href="../CSS/scanStyle.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Estilos para el mensaje en pantalla */
        #mensaje-overlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            color: #38bdf8;
            padding: 30px;
            border: 3px solid #38bdf8;
            border-radius: 20px;
            z-index: 3000;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.6);
        }

        #texto-mensaje {
            margin: 0;
            font-size: 20px;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .btn-cerrar {
            margin-top: 20px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Orbitron';
            transition: transform 0.2s;
        }

        .btn-cerrar:hover {
            transform: scale(1.05);
        }

        .info-side {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            display: flex;
        }

        .info-side.active {
            opacity: 1;
            pointer-events: auto;
        }

        .a-enter-vr,
        .a-enter-ar,
        .a-orientation-modal,
        .a-loader-title {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="mensaje-overlay">
        <p id="texto-mensaje"></p>
        <button class="btn-cerrar" onclick="cerrarMensaje()">¡ENTENDIDO!</button>
    </div>

    <div class="app-container">
        <header class="main-header">
            <h1>GALIEL<span>VISION</span></h1>
            <div class="badge-pais">
                <span id="flag-icon" class="fi fi-xx"></span>
                <span id="country-name">ESPERANDO ESCUDO...</span>
            </div>
        </header>

        <main class="content-layout">
            <section class="camera-side">
                <div class="video-window">
                    <a-scene id="escena-ar"
                        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 1; warmupTolerance: 1; missTolerance: 25"
                        embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

                        <a-assets>
                            <a-asset-item id="corona-mod" src="../Modelos/golden_crown.glb"></a-asset-item>
                            <a-asset-item id="emoji-mod" src="../Modelos/emoji_tired_cartoon.glb"></a-asset-item>
                            <a-asset-item id="trofeo-mod" src="../Modelos/world_cup_trophy.glb"></a-asset-item>
                        </a-assets>

                        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

                        <a-entity mindar-image-target="targetIndex: 0" data-id="0"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 1" data-id="1"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 2" data-id="2"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 3" data-id="3"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 4" data-id="4"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 5" data-id="5"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 6" data-id="6"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 7" data-id="7"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 8" data-id="8"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 9" data-id="9"></a-entity>
                        <a-entity mindar-image-target="targetIndex: 10" data-id="10"></a-entity>
                    </a-scene>
                    <div class="scan-frame"></div>
                </div>
            </section>

            <section class="info-side" id="info-panel">
                <h2 id="equipo-txt"
                    style=" font-size: 50px; color: #38bdf8; font-family: 'Orbitron'; text-align: center; margin-bottom: 20px;">
                    PAÍS
                </h2>
                <div class="info-card trophy-card">
                    <div class="info-text">
                        <span id="trophy-label" class="value"> MUNDIALES:</span>
                    </div>
                    <div class="view-3d">
                        <a-scene embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled: false"
                            renderer="alpha:true">
                            <a-camera look-controls="enabled: false" wasd-controls="enabled: false"
                                position="0 0 0"></a-camera>
                            <a-light type="ambient" intensity="1.5"></a-light>
                            <a-light type="directional" position="1 2 10" intensity="5"></a-light>
                            <a-entity id="trophy-container"></a-entity>
                        </a-scene>
                    </div>
                </div>
                <div class="prediction-box">
                    <div class="vote-options">
                        <div class="vote-btn">
                            <div class="vote-3d">
                                <a-scene embedded vr-mode-ui="enabled:false"
                                    device-orientation-permission-ui="enabled: false" renderer="alpha:true">
                                    <a-camera look-controls="enabled: false" position="0 0 0"></a-camera>
                                    <a-light type="ambient" intensity="1.5"></a-light>
                                    <a-light type="directional" position="1 1 10" intensity="13"></a-light>
                                    <a-entity id="corona-ent" gltf-model="#corona-mod" position="0 -0.5 -4.5"
                                        scale="1 1 1"
                                        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
                                    </a-entity>
                                </a-scene>
                            </div>
                            <button onclick="procesarVoto(true)">SÍ</button>
                        </div>

                        <div class="vote-btn">
                            <div class="vote-3d">
                                <a-scene embedded vr-mode-ui="enabled:false"
                                    device-orientation-permission-ui="enabled: false" renderer="alpha:true">
                                    <a-camera look-controls="enabled: false" position="0 0 0"></a-camera>
                                    <a-light type="ambient" intensity="1.5"></a-light>
                                    <a-light type="directional" position="1 1 1" intensity="1"></a-light>
                                    <a-entity gltf-model="#emoji-mod" position="-160 0 -90" rotation="0 -90 0"
                                        scale="40 20 40"
                                        animation__float="property: position; from: -160 -2 -90; to: -160 5 -90; dur: 1500; dir: alternate; loop: true; easing: easeInOutSine">
                                    </a-entity>
                                </a-scene>
                            </div>
                            <button class="no" onclick="procesarVoto(false)">NO</button>
                        </div>
                    </div>

                    <button id="btn-ver-mas" class="btn-highlight"
                        style="margin-top: 20px; width: 100%; height: 60px !important;">
                        <span class="btn-text">VER MÁS ACERCA DE LA SELECCIÓN</span>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const listaPaises = [
            { n: "MÉXICO", f: "fi-mx", m: 0 }, { n: "USA", f: "fi-us", m: 0 }, { n: "CANADÁ", f: "fi-ca", m: 0 },
            { n: "ESPAÑA", f: "fi-es", m: 1 }, { n: "COLOMBIA", f: "fi-co", m: 0 }, { n: "URUGUAY", f: "fi-uy", m: 2 },
            { n: "JAPÓN", f: "fi-jp", m: 0 }, { n: "COREA DEL SUR", f: "fi-kr", m: 0 }, { n: "SUDÁFRICA", f: "fi-za", m: 0 },
            { n: "UZBEKISTÁN", f: "fi-uz", m: 0 }, { n: "TÚNEZ", f: "fi-tn", m: 0 }
        ];

        let nombrePaisActual = "";
        let urlPaisActual = "";

        const targetEntities = document.querySelectorAll('[mindar-image-target]');

        targetEntities.forEach((entity) => {
            entity.addEventListener("targetFound", () => {
                const idx = parseInt(entity.dataset.id);
                const datos = listaPaises[idx];
                if (datos) {
                    nombrePaisActual = datos.n;
                    urlPaisActual = datos.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s/g, "-");

                    document.getElementById('country-name').innerText = datos.n;
                    document.getElementById('equipo-txt').innerText = datos.n;
                    document.getElementById('flag-icon').className = `fi ${datos.f}`;
                    document.getElementById('corona-ent').setAttribute('animation', 'dur', 4000);

                    const container = document.getElementById('trophy-container');
                    const label = document.getElementById('trophy-label');
                    container.innerHTML = "";

                    if (datos.m === 0) {
                        label.innerText = "SIN TÍTULOS MUNDIALES";
                    } else {
                        label.innerText = `MUNDIALES: ${datos.m}`;
                        for (let i = 0; i < datos.m; i++) {
                            const trophy = document.createElement('a-entity');
                            trophy.setAttribute('gltf-model', '#trofeo-mod');
                            const xOffset = (i - (datos.m - 1) / 2) * 12;
                            trophy.setAttribute('position', `${xOffset} -20 -38`);
                            trophy.setAttribute('scale', '0.1 0.1 0.1');
                            trophy.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear');
                            container.appendChild(trophy);
                        }
                    }
                    document.getElementById('info-panel').classList.add('active');
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 2000 });
                }
            });
        });
        function procesarVoto(voto) {
            if (!nombrePaisActual) return;

            const modal = document.getElementById('mensaje-overlay');
            const texto = document.getElementById('texto-mensaje');
            const corona = document.getElementById('corona-ent');

            // --- EL FIX DEFINITIVO ---
            // 1. Forzamos a que la animación se detenga por completo
            corona.removeAttribute('animation');

            // 2. Definimos la velocidad (300ms turbo / 4000ms normal)
            const nuevaDuracion = voto ? 300 : 4000;

            // 3. Usamos setAttribute de forma atómica para que A-Frame lo reciba como un bloque nuevo
            // Usar una cadena de texto a veces es más estable que el objeto en versiones 1.5.0
            const animString = `property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: ${nuevaDuracion}; easing: linear`;

            // 4. Re-inyectamos la animación
            corona.setAttribute('animation', animString);

            // --- LÓGICA DE TEXTO ---
            if (voto) {
                texto.innerHTML = `¡VOTASTE QUE <span style="color:#fbbf24">${nombrePaisActual}</span> SERÁ CAMPEÓN! 🏆`;
                confetti({ particleCount: 150, spread: 100 });
            } else {
                texto.innerHTML = `VOTASTE QUE <span style="color:#f87171">${nombrePaisActual}</span> NO GANARÁ. 😴`;
            }

            modal.style.display = 'block';
        }
        function cerrarMensaje() {
            document.getElementById('mensaje-overlay').style.display = 'none';
        }

        document.getElementById('btn-ver-mas').addEventListener('click', () => {
            if (urlPaisActual !== "") window.location.href = `seleccion-${urlPaisActual}.html`;
            else alert("Primero escanea un escudo");
        });
    </script>
</body>

</html>
