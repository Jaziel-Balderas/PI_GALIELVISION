<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalielVision - Escáner 2026</title>
    <link rel="stylesheet" href="../CSS/scanStyle.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/tracking-min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

    <div class="app-container">
        <header class="main-header">
            <h1>GALIEL<span>VISION</span></h1>
            <div class="badge-pais">
                <span class="fi fi-mx"></span>
                <span id="country-name">MÉXICO</span>
            </div>
        </header>

        <main class="content-layout">
            <section class="camera-side">
                <div class="video-window">
                    <a-scene
                        mindar-image="imageTargetSrc: ../AR/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no"
                        embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

                        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

                        <a-entity mindar-image-target="targetIndex: 0"></a-entity> <a-entity
                            mindar-image-target="targetIndex: 1"></a-entity> <a-entity
                            mindar-image-target="targetIndex: 2"></a-entity> <a-entity
                            mindar-image-target="targetIndex: 3"></a-entity> <a-entity
                            mindar-image-target="targetIndex: 4"></a-entity> <a-entity
                            mindar-image-target="targetIndex: 5"></a-entity> <a-entity
                            mindar-image-target="targetIndex: 6"></a-entity> <a-entity
                            mindar-image-target="targetIndex: 7"></a-entity> <a-entity
                            mindar-image-target="targetIndex: 8"></a-entity> </a-scene>

                    </a-scene>
                    <div class="scan-frame"></div>
                </div>
                <div class="button-group">
                    <button class="btn-highlight" onclick="window.location.href='../HTML/video.html'">
                        <div class="highlight-3d">
                            <a-scene embedded vr-mode-ui="enabled:false"
                                device-orientation-permission-ui="enabled: false" renderer="alpha:true">
                                <a-camera look-controls="enabled: false" wasd-controls="enabled: false"
                                    position="0 0 0"></a-camera>
                                <a-light type="ambient" intensity="1.5"></a-light>
                                <a-light type="directional" position="1 1 1" intensity="1"></a-light>
                                <a-entity gltf-model="../Modelos/porteria_futbol_soccer_goal.glb" scale="0.5 0.5 0.5"
                                    position="0 -0.39 -1.3" rotation="0 50 0"></a-entity>
                            </a-scene>
                        </div>
                        <span class="btn-text">VER MEJOR GOL</span>
                    </button>

                    <button class="btn-back-main" onclick="window.location.href='../index.html'">
                        CERRAR ESCÁNER
                    </button>
                </div>
            </section>

            <section class="info-side">

                <div class="info-card trophy-card">
                    <div class="info-text">
                        <span class="value"> MUNDIALES:</span>
                    </div>
                    <div class="view-3d">
                        <a-scene embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled: false"
                            renderer="alpha:true">
                            <a-camera look-controls="enabled: false" wasd-controls="enabled: false"
                                position="0 0 0"></a-camera>
                            <a-light type="ambient" intensity="1.5"></a-light>
                            <a-light type="directional" position="1 2 10" intensity="5"></a-light>

                            <a-entity gltf-model="../Modelos/world_cup_trophy.glb" position="0 -20 -38"
                                scale="0.1 0.1 0.1"
                                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000"></a-entity>
                        </a-scene>
                    </div>
                </div>

                <div class="stats-mini-grid">
                    <div class="stat-item">
                        <div class="mini-3d">
                            <a-scene embedded vr-mode-ui="enabled:false"
                                device-orientation-permission-ui="enabled: false" renderer="alpha:true">
                                <a-camera look-controls="enabled: false" wasd-controls="enabled: false"
                                    position="0 0 0"></a-camera>
                                <a-light type="ambient" intensity="1.5"></a-light>
                                <a-light type="directional" position="1 1 1" intensity="1"></a-light>

                                <a-entity gltf-model="../Modelos/football.glb" position="0 0 -5" scale="3 3 3"
                                    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>
                            </a-scene>
                        </div>
                        <span>GOLEADOR</span>
                    </div>

                    <div class="stat-item">
                        <div class="mini-3d">
                            <a-scene embedded vr-mode-ui="enabled:false"
                                device-orientation-permission-ui="enabled: false" renderer="alpha:true">
                                <a-camera look-controls="enabled: false" wasd-controls="enabled: false"
                                    position="0 0 0"></a-camera>
                                <a-light type="ambient" intensity="1.5"></a-light>
                                <a-light type="directional" position="1 1 1" intensity="1"></a-light>

                                <a-entity gltf-model="../Modelos/scanned_soccer_shoe.glb" position="0 0 -1.5"
                                    scale="5 5 5" rotation="0 90 0"></a-entity>
                            </a-scene>
                        </div>
                        <span>ASISTIDOR</span>
                    </div>

                    <div class="stat-item">
                        <div class="mini-3d">
                            <a-scene embedded vr-mode-ui="enabled:false"
                                device-orientation-permission-ui="enabled: false" renderer="alpha:true">
                                <a-camera look-controls="enabled: false" wasd-controls="enabled: false"
                                    position="0 0 0"></a-camera>
                                <a-light type="ambient" intensity="1.5"></a-light>
                                <a-light type="directional" position="1 5 10" intensity="2"></a-light>

                                <a-entity gltf-model="../Modelos/gloves_goalkeeper.glb" position="0 2.5 -110"
                                    scale="1 1 1" rotation="0 90 0"></a-entity>
                            </a-scene>
                        </div>
                        <span>PORTERO</span>
                    </div>

                    <div class="stat-item">
                        <div class="mini-3d">
                            <a-scene embedded vr-mode-ui="enabled:false"
                                device-orientation-permission-ui="enabled: false" renderer="alpha:true">
                                <a-camera look-controls="enabled: false" wasd-controls="enabled: false"
                                    position="0 0 0"></a-camera>
                                <a-light type="ambient" intensity="1.5"></a-light>
                                <a-light type="directional" position="1 1 1" intensity="1"></a-light>

                                <a-entity gltf-model="../Modelos/low_quality_soccer_stadium.glb" position="0 0 -60"
                                    scale="0.004 0.004 0.004" rotation="65 30 30"></a-entity>
                            </a-scene>
                        </div>
                        <span>ESTADIO</span>
                    </div>
                </div>

                <div class="prediction-box">
                    <div class="vote-options">
                        <div class="vote-btn">
                            <div class="vote-3d">
                                <a-scene embedded vr-mode-ui="enabled:false"
                                    device-orientation-permission-ui="enabled: false" renderer="alpha:true">
                                    <a-camera look-controls="enabled: false" wasd-controls="enabled: false"
                                        position="0 0 0"></a-camera>
                                    <a-light type="ambient" intensity="1.5"></a-light>
                                    <a-light type="directional" position="1 1 10" intensity="13"></a-light>

                                    <a-entity gltf-model="../Modelos/golden_crown.glb" position="-0.8 0 -6"
                                        scale="1 1 1"></a-entity>
                                </a-scene>
                            </div>
                            <button>SÍ</button>
                        </div>
                        <div class="vote-btn">
                            <div class="vote-3d">
                                <a-scene embedded vr-mode-ui="enabled:false"
                                    device-orientation-permission-ui="enabled: false" renderer="alpha:true">
                                    <a-camera look-controls="enabled: false" wasd-controls="enabled: false"
                                        position="0 0 0"></a-camera>
                                    <a-light type="ambient" intensity="1.5"></a-light>
                                    <a-light type="directional" position="1 1 1" intensity="1"></a-light>

                                    <a-entity gltf-model="../Modelos/emoji_tired_cartoon.glb" position="-160 10 -80"
                                        rotation="0 -90 0" scale="40 40 40"></a-entity>
                                </a-scene>
                            </div>
                            <button class="no">NO</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // El orden exacto de tu archivo .mind
        const targetsMap = {
            0: "mexico",
            1: "usa",
            2: "canada",
            3: "colombia",
            4: "espana",
            5: "japon",
            6: "uruguay",
            7: "sudafrica",
            8: "corea"
        };

        const teamsData = {
            "mexico": { name: "MÉXICO", flag: "fi-mx", mundiales: "17" },
            "usa": { name: "ESTADOS UNIDOS", flag: "fi-us", mundiales: "11" },
            "canada": { name: "CANADÁ", flag: "fi-ca", mundiales: "3" },
            "colombia": { name: "COLOMBIA", flag: "fi-co", mundiales: "6" },
            "espana": { name: "ESPAÑA", flag: "fi-es", mundiales: "16" },
            "japon": { name: "JAPÓN", flag: "fi-jp", mundiales: "7" },
            "uruguay": { name: "URUGUAY", flag: "fi-uy", mundiales: "14" },
            "sudafrica": { name: "SUDÁFRICA", flag: "fi-za", mundiales: "3" },
            "corea": { name: "COREA DEL SUR", flag: "fi-kr", mundiales: "11" }
        };

        function actualizarInterfaz(key) {
            const data = teamsData[key];
            if (data) {
                const nameEl = document.getElementById('country-name');
                if (nameEl) nameEl.innerText = data.name;

                const flagEl = document.querySelector('.badge-pais .fi');
                if (flagEl) {
                    flagEl.className = `fi ${data.flag}`;
                }

                const mundialesText = document.querySelector('.info-text .value');
                if (mundialesText) {
                    mundialesText.innerHTML = `MUNDIALES: <span style="color:#fbbf24">${data.mundiales}</span>`;
                }

                console.log(">>> GALIELVISION: Identificado con éxito -> " + data.name);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const sceneEl = document.querySelector('a-scene');

            const targets = document.querySelectorAll('[mindar-image-target]');

            targets.forEach((target, index) => {
                target.addEventListener("targetFound", (event) => {
                    const countryKey = targetsMap[index];
                    if (countryKey) {
                        actualizarInterfaz(countryKey);

                        if ("vibrate" in navigator) {
                            navigator.vibrate(100);
                        }
                    }
                });

                target.addEventListener("targetLost", () => {
                    console.log("Objetivo perdido");
                });
            });
        });
    </script>
</body>

</html>
